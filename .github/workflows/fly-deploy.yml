# Deploy RSSHub to Fly.io. Add repository secret FLY_API_TOKEN (run `fly tokens create deploy -x 999999h` or
# copy a deploy token from https://fly.io/user/personal_access_tokens).
name: Fly Deploy

on:
    push:
        branches:
            - master
    workflow_dispatch:

concurrency:
    group: fly-deploy-${{ github.repository }}
    cancel-in-progress: true

jobs:
    deploy:
        name: Deploy app
        runs-on: ubuntu-slim
        timeout-minutes: 45
        permissions:
            contents: read
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - uses: superfly/flyctl-actions/setup-flyctl@fc53c09e1bc3be6f54706524e3b82c4f462f77be # v1.5

            - name: Deploy to Fly.io
              run: flyctl deploy --remote-only
              env:
                  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
